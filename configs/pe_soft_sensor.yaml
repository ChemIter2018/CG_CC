# Furnace PE soft-sensor experiment configuration
data_path: data/00FurnaceCleanData.csv
target: PE
feature_slice: [1, 20]        # CSV columns 1..19 (process variables); excludes products & PE
ratios: [0.7, 0.15, 0.15]     # chronological train / val / test
embargo: 50                   # rows dropped between segments (near-duplicate boundary leakage)
models: [xgboost, lightgbm, catboost, ft_transformer, autogluon]
n_trials: 30                  # Optuna trials per tunable model
cv_splits: 4                  # TimeSeriesSplit folds for tuning
seed: 42
output_dir: experiments
model_kwargs:
  ft_transformer: {max_epochs: 150, patience: 20, batch_size: 1024}
  autogluon: {time_limit: 600, presets: best_quality}
# AutoGluon runs in its own env via:  --model-python autogluon=/path/to/ml_lab_ag/bin/python
